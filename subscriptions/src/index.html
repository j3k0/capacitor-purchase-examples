<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.iaptic.com 'unsafe-eval' 'unsafe-inline' gap:; style-src 'self' 'unsafe-inline'">
  <style>
    body { font-family: -apple-system, sans-serif; margin: 20px; margin-top: 50px; background: white; }
    #error { background-color: #ff0; padding: 4px; min-height: 1em; }
    button { padding: 10px; margin-top: 10px; display: block; }

<body>
  <h1>Subscriptions Example</h1>

  <!-- Error display -->
  <div id="error"></div>

  <!-- Subscription status -->

  <!-- Product listing (populated dynamically) -->

  <!-- Restore purchases from another device -->

  <!-- Platform subscription management -->

  <script src="/store.js"></script>
  <script type="module" src="./js/index.ts"></script>
